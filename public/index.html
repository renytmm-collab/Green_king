<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Green Kingdom LAN Prototype</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <h1>局域网双人原型</h1>
    <p class="scope">服务器权威格子地图、自由建造、金币与折线路线同步；不含单位、战斗或胜负。</p>
    <section class="panel" aria-label="Connection controls">
      <div id="connection-status" class="status">正在连接服务器…</div>
      <button id="create-room" type="button">创建房间</button>
      <label>房间号 <input id="room-id" inputmode="numeric" maxlength="6" placeholder="例如 123456"></label>
      <button id="join-room" type="button">加入房间</button>
      <p>我的身份：<strong id="identity">未分配</strong></p>
      <p>房间：<strong id="room-display">未加入</strong></p>
      <p>我的金币：<strong id="gold-display">--</strong></p>
      <p id="notice" role="status"></p>
    </section>
    <section id="build-menu" class="panel" hidden><strong>建造</strong><button type="button" data-building="mine">矿山：100</button><button type="button" data-building="tower">防御塔：150</button><button type="button" data-building="barracks">兵营：180</button></section>
    <canvas id="board" aria-label="格子地图与路线画布">从自己的兵营拖拽到敌方建筑以建立路线。</canvas>
    <p class="hint">点击自己领地的空格建造；按住自己的兵营，在空地中绘制折线并在敌方建筑上松开。路线不能穿过其他建筑。</p>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
