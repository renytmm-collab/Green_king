<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Green Kingdom LAN Prototype</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <h1>局域网双人原型</h1>
    <p class="scope">固定地图与兵营路线同步原型；不含资源、单位、战斗或胜负。</p>
    <section class="panel" aria-label="Connection controls">
      <div id="connection-status" class="status">正在连接服务器…</div>
      <button id="create-room" type="button">创建房间</button>
      <label>房间号 <input id="room-id" inputmode="numeric" maxlength="6" placeholder="例如 123456"></label>
      <button id="join-room" type="button">加入房间</button>
      <p>我的身份：<strong id="identity">未分配</strong></p>
      <p>房间：<strong id="room-display">未加入</strong></p>
      <p id="notice" role="status"></p>
    </section>
    <canvas id="board" width="960" height="540" aria-label="Map route board">从自己的兵营拖拽到相邻目标以建立路线。</canvas>
    <p class="hint">按住自己高亮的兵营并拖到相邻节点。临时线只在本机显示，服务器确认后才同步正式路线。</p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
