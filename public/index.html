<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Green Kingdom LAN Prototype</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <h1>绿色王国之战：局域网双人变体</h1>
    <p class="scope">扩张底盘、经营矿山、布置防御塔和兵营路线；摧毁敌方城堡即可获胜。</p>
    <section class="panel controls" aria-label="连接控制">
      <div id="connection-status" class="status">正在连接服务器…</div>
      <button id="create-room" type="button">创建房间</button>
      <label>房间号 <input id="room-id" inputmode="numeric" maxlength="6" placeholder="例如 123456"></label>
      <button id="join-room" type="button">加入房间</button>
      <p>我的身份：<strong id="identity">未分配</strong></p>
      <p>房间：<strong id="room-display">未加入</strong></p>
      <p>我的金币：<strong id="gold-display">--</strong></p>
      <p>战局：<strong id="battle-display">等待对手</strong></p>
      <p id="notice" role="status"></p>
    </section>
    <section id="build-menu" class="panel action-menu" hidden>
      <strong>建造</strong>
      <button type="button" data-building="mine">矿山：100</button>
      <button type="button" data-building="tower">防御塔：150</button>
      <button type="button" data-building="barracks">兵营：180</button>
    </section>
    <section id="clear-menu" class="panel action-menu" hidden>
      <strong>清除障碍</strong>
      <button id="clear-obstacle" type="button">Clear</button>
    </section>
    <section id="route-menu" class="panel action-menu" hidden>
      <strong>兵营路线</strong>
      <button id="cancel-route" type="button">Cancel 路线</button>
    </section>
    <canvas id="board" aria-label="双人王国建造与战斗画布">从自己的兵营拖拽到敌方建筑以建立路线。</canvas>
    <p class="hint">从兵营持续拖到敌方建筑；路线会吸附到方格中心，只能水平或垂直前进。拖动到相邻行或列即可形成 90° 转角，绕开树木、石头和己方建筑。</p>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
